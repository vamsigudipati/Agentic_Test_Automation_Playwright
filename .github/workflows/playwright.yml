name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            EAEmployeeWithTestSprite/backend/package-lock.json
            EAEmployeeWithTestSprite/frontend/package-lock.json
            EAEmployeeWithTestSprite/tests/package-lock.json

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm install
        working-directory: EAEmployeeWithTestSprite/backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: EAEmployeeWithTestSprite/frontend

      - name: Install Playwright & test dependencies
        run: npm install
        working-directory: EAEmployeeWithTestSprite/tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: EAEmployeeWithTestSprite/tests

      # ── Start Servers ─────────────────────────────────────────────────
      - name: Start backend server (port 4000)
        run: node server.js &
        working-directory: EAEmployeeWithTestSprite/backend

      - name: Start frontend dev server (port 5173)
        run: npm run dev &
        working-directory: EAEmployeeWithTestSprite/frontend

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on port 4000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/employees > /dev/null && echo "Backend ready!" && break
            echo "Attempt $i: not ready yet, retrying in 2s..."
            sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend on port 5173..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null && echo "Frontend ready!" && break
            echo "Attempt $i: not ready yet, retrying in 2s..."
            sleep 2
          done

      # ── Run Tests ─────────────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: EAEmployeeWithTestSprite/tests
        env:
          CI: true

      # ── Artifacts ─────────────────────────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: EAEmployeeWithTestSprite/tests/playwright-report/
          retention-days: 30

      - name: Upload test results (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: EAEmployeeWithTestSprite/tests/test-results/
          retention-days: 7
